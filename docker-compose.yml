services:
  electronic-guide:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: electronic-guide
    restart: unless-stopped

  caddy:
    image: caddy:2.9-alpine
    container_name: electronic-guide-caddy
    depends_on:
      - electronic-guide
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
